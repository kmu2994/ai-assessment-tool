# Docker Compose for AI Inclusive Assessment System
version: '3.8'

services:
  # MongoDB Database Service
  mongo:
    image: mongo:7.0
    container_name: ai-assessment-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ai_assessment
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-assessment-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DATABASE_NAME=ai_assessment
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TESSERACT_CMD=/usr/bin/tesseract
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-assessment-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: ["npx", "serve", "-s", "dist", "-l", "3000"]
    depends_on:
      - backend
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  mongo-data:
    driver: local
